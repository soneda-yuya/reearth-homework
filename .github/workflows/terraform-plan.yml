name: terraform-plan

on:
  pull_request:
    paths:
      - 'terraform/**'

permissions:
  contents: read
  id-token: write
  pull-requests: write  # post plan summary as a comment

env:
  PROJECT_ID: overseas-safety-map

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ci-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.9'

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=true

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: terraform
        run: |
          set +e
          terraform plan -no-color -out=tfplan \
            -var="project_number=${{ secrets.GCP_PROJECT_NUMBER }}" \
            -var="cms_base_url=${{ secrets.CMS_BASE_URL }}" \
            -var="cms_workspace_id=${{ secrets.CMS_WORKSPACE_ID }}" \
            > plan.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Post plan summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            if (plan.length > 60000) {
              plan = plan.slice(0, 60000) + '\n\n...(truncated)...';
            }
            const body = [
              '### Terraform plan',
              '',
              '```terraform',
              plan,
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code != '0' && steps.plan.outputs.exit_code != '2'
        run: exit 1
