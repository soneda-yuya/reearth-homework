name: terraform-plan

on:
  pull_request:
    paths:
      - 'terraform/**'

permissions:
  contents: read

# Note: we intentionally do NOT run `terraform plan` from pull-request
# workflows. The ci-deployer service account only allows impersonation from
# workflows running on the main branch (see terraform/modules/shared/wif.tf),
# which blocks PR OIDC tokens. Running fmt + validate here gives the same
# early signal for drift / syntax errors without requiring a read-only SA or
# relaxing the WIF binding. Run `terraform plan` locally (gcloud ADC) for a
# real diff before opening the PR.

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.9'

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init (backend disabled)
        working-directory: terraform/environments/prod
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: terraform/environments/prod
        run: terraform validate
